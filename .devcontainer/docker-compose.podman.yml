version: '3'

services:
  app-podman:
    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      - db-podman

    environment:
      SQL_HOST: db-podman

    volumes:
      - ../..:/workspaces:cached

    command: sleep infinity

  db-podman:
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: unless-stopped
    environment:
      SA_PASSWORD: P@ssw0rd
      ACCEPT_EULA: Y