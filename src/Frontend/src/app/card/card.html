{{currentCard | json}}
{{currentCard}}
{{currentCard.nombre}}
<h1>VALOR DEL JSON</h1>
<div [class]="cardClass" [ngStyle]="gradientStyle"> <!-- Contenedor del Título -->
    <div class="text-center mb-4">
        <h2 class="text-2xl font-bold text-white uppercase tracking-widest drop-shadow-md">
            {{ currentCard.nombre}}
        </h2>
    </div>

    <!-- Contenedor de Imagen con Estilo Retro -->
    <div class="border-3 border-slate-800 p-2 shadow-inner bg-white">
        <img [src]="currentCard.imagen" [alt]="currentCard.nombre" class="w-full h-auto object-cover" />
    </div>

    <!-- Sección de Botones Inferiores -->
    <div class="mt-6 flex flex-col gap-3">
        <!-- Botón Principal: Ver Detalles -->
        <button
            class="w-full py-2 bg-transparent border-4 border-white text-white font-bold uppercase tracking-wider hover:bg-white hover:text-slate-800 transition-colors">
            Ver Detalles
        </button>

        <!-- Botones Secundarios -->
        <div class="flex gap-2">
            <button title="Añadir a favoritos"
                class="flex-1 py-2 bg-slate-900/30 border-2 border-white text-white text-sm font-bold uppercase hover:bg-red-500 transition-colors">
                ❤️ Favorito
            </button>
            <button title="Más imágenes"
                class="flex-1 py-2 bg-slate-900/30 border-2 border-white text-white text-sm font-bold uppercase hover:bg-blue-500 transition-colors">
                🖼️ Imágenes
            </button>
        </div>
    </div>
</div>
